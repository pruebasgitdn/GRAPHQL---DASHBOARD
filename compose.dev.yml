services:

  app:
    #imagen de maven java q tiene la V de maven y la V de java
    #que es en ese entorno q corre la api si sabe
    image: maven:3.9.9-eclipse-temurin-21
    container_name: spring-backend-dev
    working_dir: /back # carpeta del proyecto


    #Garantiza que la información (como bases de datos) no se borre
    #Si el contenedor se apaga o reinicia,
    #y permite compartir archivos entre varios contenedores.
    volumes:
      - .:/back #carpeta del back que monta el codigo
      - ~/.m2:/root/.m2 # dependencias maven locales
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

    command: mvn spring-boot:run # ejecutar comando

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tasksync
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: daniloospina7
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379


  postgres:
    image: postgres:14-alpine
    container_name: postgres-db-env
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tasksync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: daniloospina7
    volumes:
      - postgres-data:/var/lib/postgresql/data


  redis:
    image: redis:7-alpine
    container_name: redis-server-dev
    ports:
      - "6379:6379"


volumes:
  postgres-data: